# Production Docker Compose with Nginx Reverse Proxy
# Use this instead of the root docker-compose.yml for HTTPS deployments
# 
# Usage:
#   docker-compose -f deployment/docker-compose.production.yml up -d

version: '3.8'

services:
  emby-trakt-suite:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: emby-trakt-suite
    # ⚠️ NOT exposed directly in production - only via nginx
    expose:
      - "8000"
      - "8001"
    environment:
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET}
      EMBY_URL: ${EMBY_URL}
      EMBY_API_KEY: ${EMBY_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      ENABLE_SMART_QUEUE: ${ENABLE_SMART_QUEUE:-true}
      ENABLE_ML_PREDICTOR: ${ENABLE_ML_PREDICTOR:-true}
      ENABLE_UNIVERSE_DISCOVERY: ${ENABLE_UNIVERSE_DISCOVERY:-true}
      ENABLE_WATCH_PARTY: ${ENABLE_WATCH_PARTY:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SMART_QUEUE_CRON: ${SMART_QUEUE_CRON:-0 2 * * *}
      UNIVERSE_SCAN_CRON: ${UNIVERSE_SCAN_CRON:-0 3 * * 0}
      ML_RETRAIN_CRON: ${ML_RETRAIN_CRON:-0 4 * * 1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SSL_DOMAIN: ${SSL_DOMAIN:-}
    volumes:
      - models:/app/models
      - cache:/app/cache
      - logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - emby-trakt
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ✅ Nginx reverse proxy for HTTPS
  nginx:
    image: nginx:alpine
    container_name: emby-trakt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-entrypoint.sh:/nginx-entrypoint.sh:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro   # ACME challenge files
      - nginx-cache:/var/cache/nginx
    entrypoint: ["/bin/sh", "/nginx-entrypoint.sh"]
    depends_on:
      - emby-trakt-suite
    restart: unless-stopped
    networks:
      - emby-trakt
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ✅ Certbot for automated SSL certificate renewal
  certbot:
    image: certbot/certbot:latest
    container_name: emby-trakt-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - /var/log/letsencrypt:/var/log/letsencrypt
      - certbot-webroot:/var/www/certbot        # Shared webroot for ACME challenges
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - emby-trakt

  redis:
    image: redis:7-alpine
    container_name: emby-trakt-redis
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - emby-trakt
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:16-alpine
    container_name: emby-trakt-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - emby-trakt
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  redis-data:
  postgres-data:
  models:
  cache:
  logs:
  nginx-cache:
  certbot-webroot:

networks:
  emby-trakt:
    driver: bridge
