<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emby-Trakt Watch Party</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22263a;
    --border: #2a2e3e;
    --text: #e0e0e6;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00b894;
    --orange: #fdcb6e;
    --red: #e17055;
    --blue: #74b9ff;
    --radius: 10px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.6;
    min-height: 100vh;
  }

  .header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .header .version {
    font-size: 0.75rem;
    color: var(--text-dim);
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .nav {
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .nav a {
    color: var(--text);
    text-decoration: none;
    font-size: 0.9rem;
    padding: 7px 12px;
    border-radius: 6px;
    background: transparent;
  }
  .nav a:hover { background: var(--surface-hover); }

  .container { max-width: 1200px; margin: 0 auto; padding: 28px 32px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h3 { font-size: 1.1rem; margin-bottom: 12px; font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }

  .stat { text-align: center; padding: 16px; }
  .stat .value { font-size: 2rem; font-weight: 700; color: var(--accent-light); }
  .stat .label { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

  .badge-on { background: rgba(0,184,148,0.15); color: var(--green); padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }
  .badge-off { background: rgba(225,112,85,0.15); color: var(--red); padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  th { color: var(--text-dim); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }

  .btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    text-decoration: none;
  }
  .btn:hover { background: var(--accent-light); color: #111; }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

  .log-area {
    background: #111318;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    max-height: 400px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
  }
  .log-entry { padding: 2px 0; }
  .log-ts { color: var(--text-dim); margin-right: 8px; }

  .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎬 Emby-Trakt Watch Party</h1>
  <span class="version">v1.0.0</span>
</div>

<div class="nav">
  <a href="/watch-party">👥 Watch Party</a>
  <a href="/settings">⚙️ Settings</a>
</div>

<div class="container">

  <!-- Connection Status -->
  <div class="grid">
    <div class="card">
      <h3>🔌 Connections</h3>
      <div id="connectionStatus">Loading…</div>
    </div>
    <div class="card">
      <h3>👥 Linked Users</h3>
      <div id="usersTable">Loading…</div>
    </div>
  </div>

  <!-- Active Parties -->
  <div class="card">
    <h3>🎉 Active Watch Parties</h3>
    <div id="activeParties">Loading…</div>
    <div style="margin-top:16px;">
      <a href="/watch-party" class="btn">Create or Join a Party</a>
    </div>
  </div>

  <!-- Recent Activity -->
  <div class="card">
    <h3>📜 Recent Activity</h3>
    <div id="activityLog" class="log-area">Loading…</div>
  </div>

</div>

<script>
const API = '';

async function loadConnections() {
  const el = document.getElementById('connectionStatus');
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    el.innerHTML = `<span class="badge-on">✓ Service Running</span>`;
  } catch(e) {
    el.innerHTML = `<span class="badge-off">✗ Service Down</span>`;
  }
}

async function loadUsers() {
  const el = document.getElementById('usersTable');
  try {
    const r = await fetch(API + '/auth/users');
    const users = await r.json();
    if (!users.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">👤</div><p>No users linked yet.<br>Go to <a href="/watch-party" style="color:var(--accent-light)">Watch Party</a> to link your Trakt account.</p></div>';
      return;
    }
    let html = '<table><thead><tr><th>User</th><th>Trakt</th><th>Token</th></tr></thead><tbody>';
    for (const u of users) {
      const status = u.linked
        ? `<span class="badge-on">${u.token_status || 'linked'}</span>`
        : '<span class="badge-off">not linked</span>';
      html += `<tr>
        <td>${u.emby_username || u.emby_user_id}</td>
        <td>${u.trakt_username || '—'}</td>
        <td>${status}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<span class="badge-off">Failed to load users</span>';
  }
}

async function loadParties() {
  const el = document.getElementById('activeParties');
  try {
    const r = await fetch(API + '/parties');
    const parties = await r.json();
    if (!parties.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">🍿</div><p>No active parties right now.</p></div>';
      return;
    }
    let html = '<table><thead><tr><th>Code</th><th>Title</th><th>Status</th><th>Participants</th><th></th></tr></thead><tbody>';
    for (const p of parties) {
      html += `<tr>
        <td><strong>${p.code}</strong></td>
        <td>${p.title}</td>
        <td>${p.status}</td>
        <td>${(p.participants || []).join(', ') || '—'}</td>
        <td><a href="/watch-party?code=${p.code}" class="btn btn-sm">Join</a></td>
      </tr>`;
    }
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<span class="badge-off">Failed to load parties</span>';
  }
}

async function loadActivity() {
  const el = document.getElementById('activityLog');
  try {
    const r = await fetch(API + '/api/activity?limit=30');
    const entries = await r.json();
    if (!entries.length) {
      el.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px;">No activity yet. Start watching something!</div>';
      return;
    }
    let html = '';
    for (const e of entries) {
      html += `<div class="log-entry"><span class="log-ts">${e.ts}</span>${e.msg}</div>`;
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<span class="badge-off">Failed to load activity</span>';
  }
}

// Initial load
loadConnections();
loadUsers();
loadParties();
loadActivity();

// Auto-refresh every 15 seconds
setInterval(() => {
  loadParties();
  loadActivity();
}, 15000);
</script>
</body>
</html>
